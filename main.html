<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested HTML Tables</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #f7f8fa;
            padding: 30px;
        }

        table {
            border-collapse: collapse;

        }

        .main-table {
            border: 3px solid #000;
            width: 900px;
        }

        .main-table>tbody>tr>td {
            border: 2px solid #000;
            vertical-align: top;
            padding: 15px;
            height: 220px;
            width: 50px;

        }

        .nested-table {
            border: 2px solid #000;
            width: 100%;
        }

        .nested-table th,
        .nested-table td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: center;
        }

        .nested-table th {
            font-weight: bold;
        }
        .black-cell{
            background-color: #000;
            color: #fff;
            font-weight: bold;
        }
        .nested-link{
            color:#5b2c92;
            text-decoration: underline;
        }
        ul.list-cell{
            list-style-type: disc;
            text-align:left;
            padding-left: 40px;
            margin:10px 0;
        }
        ul.list-cell li{
            padding:4px 0;
        }
    </style>
</head>

<body>
    <h1>Nested HTML Tables</h1>
    <table class="main-table">
        <tbody>
            <tr>
                <td>
                    <table class="nested-table">
                        <tr>
                            <th colspan="2">Nested Table 2</th>
                        </tr>
                        <tr>
                            <th>Coloum 1 </th>
                            <th>Coloum 2</th>
                        </tr>
                        <tr>
                            <td>abc</td>
                            <td>def</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table class="nested-table">
                        <tr>
                            <th>Nested Table 1</th>
                        </tr>
                        <tr>
                            <td>
                                <ul class="list-cell">
                                    <li>List item 1</li>
                                    <li>List item 2</li>
                                    <li>List item 3</li>
                                </ul>
                            </td>
                        </tr>
                    </table>
                </td>
               
            </tr>
            <tr>
                <td>
                    <table class="nested-table">
                        <tr>
                            <th colspan="2">Nested Table 3</th>
                        </tr>
                        <tr>
                            <td><a href="#" class="nested-link">Nested Table </a></td>
                            <td>Demo Continued</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table class="nested-table">
                        <tr>
                            <th>Nested Table 4</th>
                        </tr>
                        <tr>
                            <td class="black-cell">HTML</td>
                        </tr>
                    </table>
                </td>
            </tr>
            
        </tbody>
    </table>
</body>

</html>
